<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Typing Trainer by Mr.G</title>

    <link rel="stylesheet" href="settings.css">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

</head>

<body>

    <div class="settingsCard">

        <h1>Typing Practice</h1>

        <div class="section">

            <label>Mode</label>

            <div class="controls">
                <select id="mode">
                    <option value="random">Random Words</option>
                    <option value="custom">Custom Paragraph</option>
                </select>

                <select id="fontSelect">
                    <option value="JetBrains Mono">English</option>
                    <option value="Avaice">Tamil Avaice</option>
                </select>

                <select id="timeSelect">
                    <option value="60">1 Minute</option>
                    <option value="180">3 Minutes</option>
                    <option value="300">5 Minutes</option>
                    <option value="30">30 Seconds</option>
                    <option value="10">10 Seconds</option>
                </select>
            </div>

        </div>

        <div class="section">

            <label>Options</label>

            <div class="controls">

                <label class="toggle">
                    <input type="checkbox" id="voice">
                    Voice Dictation
                </label>

                <label class="toggle">
                    <input type="checkbox" id="hideText">
                    Hide Text Mode
                </label>

            </div>

        </div>

        <div class="section">

            <label>Custom Paragraph</label>

            <textarea id="customText" placeholder="Paste paragraph here..."></textarea>

        </div>

        <button class="startBtn" onclick="startPractice()">Start Typing</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
