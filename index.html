<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Typing Practice Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: "Avaice";
            src: url("Avaice Font.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #111827, #1f2937);
            font-family:Poppins;
            color: white;
            display: flex;
            justify-content: center;
            padding: 30px;
            min-height: 100vh;
        }

        .container {
            width: 900px;
            background: #1f2937;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .5);
        }

        h1 {
            text-align: center;
            margin-top: 0
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        select,
        button {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }

        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-top: 10px;
        }

        #textDisplay {
            margin-top: 15px;
            background: #111827;
            padding: 20px;
            border-radius: 8px;
            font-size: 24px;
            line-height: 38px;
            min-height: 140px;
            max-height: 220px;
            overflow-y: auto;
        }

        #typingInput {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 18px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .correct {
            color: #22c55e
        }

        .wrong {
            color: #ef4444;
            background: #3f1d1d
        }

        .current {
            background: #374151;
            border-bottom: 2px solid #3b82f6
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 18px;
        }

        .result {
            text-align: center;
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        @keyframes blink {
            0% {
                opacity: 1
            }

            50% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }

        .caret {
            width: 2px;
            height: 28px;
            background: #3b82f6;
            display: inline-block;
            animation: blink 1s infinite;
        }

        .heatmap {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
        }

        .key {
            padding: 8px;
            background: #111827;
            text-align: center;
            border-radius: 4px;
            font-size: 14px;
        }

        .key.low {
            background: #22c55e
        }

        .key.mid {
            background: #f97316
        }

        .key.hot {
            background: #ef4444
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Typing Practice Pro</h1>

        <div class="controls">

            <select id="mode">
                <option value="random">Random Words</option>
                <option value="custom">Custom Paragraph</option>
            </select>

            <select id="fontSelect">
                <option value="JetBrains Mono">English</option>
                <option value="Avaice">Tamil Avaice</option>
                <!-- <option value="Roboto">Roboto</option>
                <option value="Courier New">Courier New</option> -->
            </select>

            <select id="timeSelect">
                <option value="60">1 Min</option>
                <option value="180">3 Min</option>
                <option value="300">5 Min</option>
            </select>

            <label><input type="checkbox" id="voice"> Voice</label>
            <label><input type="checkbox" id="hideText"> Hide Text</label>

            <button onclick="startTest()">Start</button>

        </div>

        <textarea id="customText" placeholder="Paste text here"></textarea>

        <div id="textDisplay"></div>

        <input id="typingInput" placeholder="Start typing..." disabled>

        <div class="stats">
            <div>Time: <span id="time">0</span></div>
            <div>WPM: <span id="wpm">0</span></div>
            <div>KPM: <span id="kpm">0</span></div>
            <div>Errors: <span id="errors">0</span></div>
        </div>

        <div class="result" id="result"></div>

        <h3>Mistake Heatmap</h3>
        <div class="heatmap" id="heatmap"></div>

    </div>

    <script>

        const commonWords = [
            "the", "be", "to", "of", "and", "a", "in", "that", "have", "I",
            "it", "for", "not", "on", "with", "he", "as", "you", "do", "at",
            "this", "but", "his", "by", "from", "they", "we", "say", "her", "she"
        ];

        let text = "";
        let wordsList = [];
        let currentWordIndex = 0;

        let timer, startTime;
        let errors = 0, totalKeys = 0, duration = 60;

        let keyMistakes = {};
        const keyboard = "abcdefghijklmnopqrstuvwxyz".split("");

        function initHeatmap() {
            const map = document.getElementById("heatmap");
            map.innerHTML = "";
            keyboard.forEach(k => {
                let d = document.createElement("div");
                d.className = "key";
                d.id = "key_" + k;
                d.textContent = k;
                map.appendChild(d);
            });
        }
        initHeatmap();

        function randomText() {
            let arr = [];
            for (let i = 0; i < 120; i++) {
                arr.push(commonWords[Math.floor(Math.random() * commonWords.length)]);
            }
            return arr.join(" ");
        }

        function speakWord(word) {
            const msg = new SpeechSynthesisUtterance(word);
            msg.rate = 0.7;
            msg.pitch = 1;
            speechSynthesis.cancel();
            speechSynthesis.speak(msg);
        }

        function startTest() {

            clearInterval(timer);

            errors = 0;
            totalKeys = 0;
            keyMistakes = {};

            duration = parseInt(document.getElementById("timeSelect").value);

            let mode = document.getElementById("mode").value;

            if (mode === "random")
                text = randomText();
            else
                text = document.getElementById("customText").value;

            if (!text) {
                alert("Enter text first");
                return;
            }

            wordsList = text.split(" ");
            currentWordIndex = 0;

            let font = document.getElementById("fontSelect").value;
            document.getElementById("textDisplay").style.fontFamily = font;

            if (document.getElementById("hideText").checked)
                document.getElementById("textDisplay").innerHTML = "(Hidden Text Mode)";
            else
                renderText();

            if (document.getElementById("voice").checked)
                speakWord(wordsList[currentWordIndex]);

            document.getElementById("typingInput").value = "";
            document.getElementById("typingInput").disabled = false;
            document.getElementById("typingInput").focus();

            document.getElementById("errors").textContent = 0;
            document.getElementById("result").textContent = "";

            startTime = new Date();
            timer = setInterval(updateStats, 1000);
        }

        function renderText() {

            const display = document.getElementById("textDisplay");
            display.innerHTML = "";

            text.split("").forEach((char, i) => {
                let span = document.createElement("span");
                span.innerText = char;
                if (i === 0) span.classList.add("current");
                display.appendChild(span);
            });

        }

        const input = document.getElementById("typingInput");

        input.addEventListener("keydown", function (e) {

            if (e.key === "Tab") {
                e.preventDefault();
                if (document.getElementById("voice").checked) {
                    speakWord(wordsList[currentWordIndex]);
                }
            }

            if (e.key === " ") {
                currentWordIndex++;
                if (document.getElementById("voice").checked && wordsList[currentWordIndex]) {
                    speakWord(wordsList[currentWordIndex]);
                }
            }

        });

        input.addEventListener("input", function () {

            const typed = this.value;
            totalKeys++;

            if (document.getElementById("hideText").checked) return;

            const spans = document.querySelectorAll("#textDisplay span");

            for (let i = 0; i < spans.length; i++) {

                let char = typed[i];

                if (char == null) {

                    spans[i].className = "";
                    if (i === typed.length) spans[i].classList.add("current");

                }

                else if (char === spans[i].innerText) {

                    spans[i].className = "correct";

                }

                else {

                    if (!spans[i].classList.contains("wrong")) {
                        errors++;
                        trackMistake(char);
                    }

                    spans[i].className = "wrong";

                }

            }

            document.getElementById("errors").textContent = errors;

        });

        function trackMistake(char) {

            char = char?.toLowerCase();

            if (!keyboard.includes(char)) return;

            keyMistakes[char] = (keyMistakes[char] || 0) + 1;

            keyboard.forEach(k => {
                let el = document.getElementById("key_" + k);
                let val = keyMistakes[k] || 0;

                el.className = "key";

                if (val > 5) el.classList.add("hot");
                else if (val > 2) el.classList.add("mid");
                else if (val > 0) el.classList.add("low");
            });

        }

        function updateStats() {

            const elapsed = (new Date() - startTime) / 1000;

            document.getElementById("time").textContent = Math.floor(elapsed);

            let minutes = elapsed / 60;

            let kpm = Math.round(totalKeys / minutes);
            document.getElementById("kpm").textContent = isFinite(kpm) ? kpm : 0;

            let words = input.value.trim().split(/\s+/).length;
            let wpm = Math.round(words / minutes);
            document.getElementById("wpm").textContent = isFinite(wpm) ? wpm : 0;

            if (elapsed >= duration) finishTest();

        }

        function finishTest() {

            clearInterval(timer);

            let typed = input.value;
            let correct = 0;

            for (let i = 0; i < typed.length; i++) {
                if (typed[i] === text[i]) correct++;
            }

            let accuracy = ((correct / typed.length) * 100 || 0).toFixed(2);

            document.getElementById("result").innerHTML =
                "Finished • Accuracy: " + accuracy + "%";

            input.disabled = true;

        }

    </script>

</body>

</html>
