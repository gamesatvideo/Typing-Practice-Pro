<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Typing Practice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Typing Test</h1>

        <div id="textDisplay"></div>

        <input id="typingInput" placeholder="Start typing...">

        <div class="stats">
            <div>Time: <span id="time">0</span></div>
            <div>WPM: <span id="wpm">0</span></div>
            <div>KPM: <span id="kpm">0</span></div>
            <div>Errors: <span id="errors">0</span></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
